<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilestoneMoney</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            /* Professional backgrounds - choose one! */
            
            /* Option 1: Clean Subtle Gradient (Current) */
            background: linear-gradient(180deg, #f5f5f7 0%, #e8e8ed 100%);
            
            /* Option 2: Ultra Light Blue Tint */
            /* background: linear-gradient(180deg, #ffffff 0%, #f0f2f5 100%); */
            
            /* Option 3: Soft Neutral Gradient */
            /* background: linear-gradient(135deg, #fafbfc 0%, #f0f2f5 100%); */
            
            /* Option 4: Very Subtle Blue */
            /* background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%); */
            min-height: 100vh;
        }
        
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 48px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08), 
                        0 1px 3px rgba(0, 0, 0, 0.05);
        }
        
        h1 {
            color: #1d1d1f;
            text-align: center;
            font-weight: 700;
            font-size: 36px;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            text-align: center;
            color: #86868b;
            font-size: 17px;
            margin-bottom: 40px;
        }
        
        .input-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .input-group {
            background: #f5f5f7;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #e5e5ea;
            transition: all 0.3s ease;
        }

        .input-group:hover {
            background: #f0f0f5;
            border-color: #d1d1d6;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 10px;
            color: #1d1d1f;
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0.3px;
        }
        
        input, select {
            width: 100%;
            padding: 14px 16px;
            font-size: 17px;
            border: 2px solid transparent;
            border-radius: 12px;
            box-sizing: border-box;
            background: white;
            color: #1d1d1f;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #007aff;
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.15), 0 4px 12px rgba(0, 0, 0, 0.1);
        }
        
        .variables-section {
            background: #f5f5f7;
            padding: 24px;
            border-radius: 16px;
            border: 1px solid #e5e5ea;
            margin-bottom: 28px;
        }
        
        .variables-section h2 {
            color: #1d1d1f;
            font-size: 20px;
            font-weight: 600;
            margin: 0 0 16px 0;
        }
        
        .add-variable-btn {
            width: auto;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .add-variable-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.5);
        }
        
        .calculate-btn {
            width: 100%;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            background: linear-gradient(135deg, #007aff 0%, #5856d6 100%);
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.4);
            letter-spacing: 0.5px;
        }
        
        .calculate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 122, 255, 0.5);
        }
        
        .calculate-btn:active {
            transform: translateY(0);
        }
        
        .chart-container {
            margin-top: 48px;
            margin-bottom: 48px;
            position: relative;
            height: 450px;
            padding: 32px;
            background: #f5f5f7;
            border-radius: 16px;
            border: 1px solid #e5e5ea;
        }
        
        table {
            width: 100%;
            margin-top: 32px;
            border-collapse: separate;
            border-spacing: 0;
            overflow: hidden;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        
        th {
            background: linear-gradient(135deg, #f5f5f7 0%, #e8e8ed 100%);
            color: #1d1d1f;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 16px 20px;
            text-align: left;
            border-bottom: 2px solid #d2d2d7;
        }
        
        td {
            padding: 14px 20px;
            text-align: left;
            border-bottom: 1px solid #e5e5ea;
            color: #1d1d1f;
            font-size: 15px;
        }
        
        tbody tr:last-child td {
            border-bottom: none;
        }
        
        tbody tr {
            transition: background-color 0.2s ease;
        }
        
        tbody tr:hover {
            background-color: #f5f5f7;
        }
        
        .positive {
            color: #34c759;
            font-weight: 500;
        }
        
        .variable-item {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            align-items: center;
        }
        
        .variable-item input[type="text"],
        .variable-item input[type="number"] {
            padding: 12px 14px;
            font-size: 15px;
        }
        
        .variable-item input[type="text"] {
            flex: 1;
        }
        
        .variable-item input[type="number"] {
            width: 140px;
        }
        
        .variable-item button {
            width: 40px;
            height: 40px;
            padding: 0;
            font-size: 20px;
            line-height: 1;
            background: linear-gradient(135deg, #ff3b30 0%, #cc0000 100%);
            border-radius: 10px;
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(255, 59, 48, 0.4);
        }
        
        .variable-item button:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(255, 59, 48, 0.5);
        }
        
        .historical-section {
            background: #f5f5f7;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #e5e5ea;
            margin-bottom: 28px;
            text-align: center;
        }
        
        .historical-section h2 {
            color: #1d1d1f;
            font-size: 18px;
            margin: 0 0 12px 0;
        }
        
        .historical-note {
            color: #48484a;
            font-size: 15px;
            margin: 0 0 12px 0;
            line-height: 1.6;
        }
        
        .historical-btn {
            display: inline-block;
            margin: 8px 6px 0;
            padding: 10px 18px;
            background: linear-gradient(135deg, #007aff 0%, #0051d5 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0, 122, 255, 0.3);
        }
        
        .historical-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.4);
        }
        
        .disclaimer {
            color: #86868b;
            font-size: 12px;
            margin: 12px 0 0 0;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 32px 24px;
            }
            
            h1 {
                font-size: 28px;
            }
            
            .input-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MilestoneMoney</h1>
        <p class="subtitle">Watch your wealth grow, sip by sip 💸</p>
        
        <div class="historical-section">
            <h2>Historical Market Context</h2>
            <div id="historical-info">
                <p class="historical-note">
                    <strong>INR Markets:</strong> Nifty 50 average (1990-2025): ~12% annual return | Sensex average: ~13%
                    <button class="historical-btn" onclick="setHistoricalReturn('nifty')">Use Nifty 50 (12%)</button>
                    <button class="historical-btn" onclick="setHistoricalReturn('sensex')">Use Sensex (13%)</button>
                </p>
            </div>
            <p class="disclaimer">
                ⚠️ Note: Past performance does not guarantee future results. Historical averages are for reference only.
            </p>
        </div>
        
        <!-- 
        Alternative catchy taglines:
        
        1. "Invest small, grow big – sip by sip"
        2. "Your financial future, one sip at a time"
        3. "SIP smarter, grow wealthier"
        4. "Watch your wealth blossom with every SIP"
        5. "Small monthly steps, giant wealth leaps"
        6. "Turn your dreams into wealth, one SIP at a time"
        -->
        
        <div class="input-section">
            <div class="input-group">
                <label for="currency">Currency</label>
                <select id="currency">
                    <option value="INR">INR (₹)</option>
                    <option value="USD">USD ($)</option>
                </select>
            </div>
            
            <div id="inrUnitGroup" class="input-group">
                <label for="inrUnit">INR Unit</label>
                <select id="inrUnit">
                    <option value="rupees">Rupees</option>
                    <option value="lakhs">Lakhs</option>
                    <option value="crores" selected>Crores</option>
                </select>
            </div>
            
            <div class="input-group">
                <label for="initial">Initial Corpus</label>
                <input type="number" id="initial" value="1" step="0.01">
            </div>
            
            <div class="input-group">
                <label for="annual">Monthly SIP</label>
                <input type="number" id="annual" value="0.0417" step="0.001">
            </div>
            
            <div class="input-group">
                <label for="stepup">Annual SIP Increase (%)</label>
                <input type="number" id="stepup" value="5" step="1">
            </div>
            
            <div class="input-group">
                <label for="return">Annual Return (%)</label>
                <input type="number" id="return" value="7" step="0.5">
            </div>
            
            <div class="input-group">
                <label for="start-year">Starting Year</label>
                <input type="number" id="start-year" value="2026" step="1">
            </div>
            
            <div class="input-group">
                <label for="inflation">Inflation Rate (%)</label>
                <input type="number" id="inflation" value="4" step="0.1">
            </div>
        </div>
        
        <div class="variables-section">
            <h2>Custom Variables</h2>
            <div id="custom-variables"></div>
            <button class="add-variable-btn" onclick="addCustomVariable()">+ Add Variable</button>
        </div>
        
        <button class="calculate-btn" onclick="calculate()">Calculate Growth</button>
        
        <div class="chart-container">
            <canvas id="growthChart"></canvas>
        </div>
        
        <table id="results">
        </table>
    </div>

    <script>
        let chart;
        let customVariables = [];
        let variableIdCounter = 0;
        
        function addCustomVariable() {
            variableIdCounter++;
            const variable = {
                id: variableIdCounter,
                name: `Variable ${variableIdCounter}`,
                startValue: 0
            };
            customVariables.push(variable);
            renderCustomVariables();
            calculate();
        }
        
        function removeCustomVariable(id) {
            customVariables = customVariables.filter(v => v.id !== id);
            renderCustomVariables();
            calculate();
        }
        
        function renderCustomVariables() {
            const container = document.getElementById('custom-variables');
            container.innerHTML = '';
            
            customVariables.forEach(variable => {
                const div = document.createElement('div');
                div.className = 'variable-item';
                div.innerHTML = `
                    <input type="text" value="${variable.name}" 
                           onchange="updateVariableName(${variable.id}, this.value)"
                           placeholder="Variable Name">
                    <input type="number" value="${variable.startValue}" step="1"
                           onchange="updateVariableValue(${variable.id}, parseFloat(this.value))"
                           placeholder="Start Value">
                    <button onclick="removeCustomVariable(${variable.id})">×</button>
                `;
                container.appendChild(div);
            });
        }
        
        function updateVariableName(id, name) {
            const variable = customVariables.find(v => v.id === id);
            if (variable) {
                variable.name = name;
                calculate();
            }
        }
        
        function updateVariableValue(id, value) {
            const variable = customVariables.find(v => v.id === id);
            if (variable) {
                variable.startValue = value;
                calculate();
            }
        }
        
        function formatNumber(num, currency, inrUnit) {
            const symbol = currency === 'INR' ? '₹' : '$';
            
            if (currency === 'INR') {
                let displayNum = num;
                let unitSuffix = '';
                
                if (inrUnit === 'lakhs') {
                    displayNum = num / 100000;
                    unitSuffix = ' L';
                } else if (inrUnit === 'crores') {
                    displayNum = num / 10000000;
                    unitSuffix = ' Cr';
                }
                
                const parts = displayNum.toFixed(2).split('.');
                let intPart = parts[0];
                let lastThree = intPart.slice(-3);
                let otherNumbers = intPart.slice(0, -3);
                if (otherNumbers !== '') {
                    lastThree = ',' + lastThree;
                }
                const formattedInt = otherNumbers.replace(/\B(?=(\d{2})+(?!\d))/g, ",") + lastThree;
                return symbol + formattedInt + '.' + parts[1] + unitSuffix;
            } else {
                return symbol + num.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            }
        }
        
        function convertToRupees(value, unit) {
            if (unit === 'lakhs') return value * 100000;
            if (unit === 'crores') return value * 10000000;
            return value;
        }
        
        function calculate() {
            const currency = document.getElementById('currency').value;
            const inrUnit = document.getElementById('inrUnit').value;
            let initial = parseFloat(document.getElementById('initial').value);
            let initialMonthlySIP = parseFloat(document.getElementById('annual').value);
            const annualStepUpRate = parseFloat(document.getElementById('stepup').value) / 100;
            const annualRate = parseFloat(document.getElementById('return').value) / 100;
            const monthlyRate = annualRate / 12;
            const startYear = parseInt(document.getElementById('start-year').value);
            const inflationRate = parseFloat(document.getElementById('inflation').value) / 100;
            
            if (currency === 'INR') {
                initial = convertToRupees(initial, inrUnit);
                initialMonthlySIP = convertToRupees(initialMonthlySIP, inrUnit);
            }
            
            // Initialize variable values
            let variableValues = {};
            customVariables.forEach(v => {
                variableValues[v.id] = v.startValue;
            });
            
            let current = initial;
            let html = '<tr><th>Year</th><th>Start Corpus</th><th>Monthly SIP</th><th>Total SIP</th><th>Growth</th><th>End Corpus</th><th>Inflation-Adjusted</th>';
            
            // Add variable columns
            customVariables.forEach(v => {
                html += `<th>${v.name}</th>`;
            });
            html += '</tr>';
            
            let years = [];
            let corpusValues = [];
            let displayValues = [];
            
            // Prepare chart datasets - Tufte-style: minimal, clean, data-focused
            let chartDatasets = [
                {
                    label: 'Corpus Growth',
                    data: [],
                    borderColor: '#007aff',
                    backgroundColor: 'rgba(0, 122, 255, 0.05)',
                    fill: true,
                    tension: 0.3,
                    yAxisID: 'y',
                    borderWidth: 2.5,
                    pointRadius: 0, // Hide points - Tufte style, focus on line
                    pointHoverRadius: 4
                },
                {
                    label: 'Inflation-Adjusted',
                    data: [],
                    borderColor: '#ff9500',
                    backgroundColor: 'rgba(255, 149, 0, 0.05)',
                    fill: true,
                    tension: 0.3,
                    yAxisID: 'y',
                    borderWidth: 2,
                    borderDash: [3, 2],
                    pointRadius: 0,
                    pointHoverRadius: 4
                }
            ];
            
            // Variable colors for chart
            const variableColors = [
                '#ff3b30', '#5856d6', '#ff2d55', '#5ac8fa', '#34c759'
            ];
            
            customVariables.forEach((v, i) => {
                chartDatasets.push({
                    label: v.name,
                    data: [],
                    borderColor: variableColors[i % variableColors.length],
                    backgroundColor: 'transparent',
                    borderDash: [4, 3],
                    tension: 0.3,
                    yAxisID: 'y1',
                    borderWidth: 1.5,
                    pointRadius: 0, // No data points - Tufte style
                    pointHoverRadius: 3
                });
            });
            
            for (let yearOffset = 0; yearOffset < 30; yearOffset++) {
                const currentYear = startYear + yearOffset;
                const startCorpus = current;
                let totalSIP = 0;
                
                // Calculate current year's monthly SIP with step-up
                let currentMonthlySIP = initialMonthlySIP * Math.pow(1 + annualStepUpRate, yearOffset);
                
                // Monthly compounding and SIP contributions for 12 months
                for (let month = 1; month <= 12; month++) {
                    // Add SIP at the end of the month (standard SIP practice)
                    const growth = current * monthlyRate;
                    current = current + growth + currentMonthlySIP;
                    totalSIP += currentMonthlySIP;
                }
                
                const growth = current - startCorpus - totalSIP;
                
                // Calculate inflation-adjusted (present value)
                const inflationFactor = Math.pow(1 + inflationRate, yearOffset + 1);
                const inflationAdjusted = current / inflationFactor;
                
                html += `
                    <tr>
                        <td>${currentYear}</td>
                        <td>${formatNumber(startCorpus, currency, inrUnit)}</td>
                        <td>${formatNumber(currentMonthlySIP, currency, inrUnit)}</td>
                        <td>${formatNumber(totalSIP, currency, inrUnit)}</td>
                        <td class="positive">+${formatNumber(growth, currency, inrUnit)}</td>
                        <td>${formatNumber(current, currency, inrUnit)}</td>
                        <td>${formatNumber(inflationAdjusted, currency, inrUnit)}</td>
                `;
                
                // Update and add variable values to row
                customVariables.forEach(v => {
                    html += `<td>${variableValues[v.id]}</td>`;
                    // Increment variables only after the first year
                    variableValues[v.id] += 1;
                });
                html += '</tr>';
                
                years.push(currentYear);
                corpusValues.push(current);
                
                let displayValue, displayInflationAdjusted;
                if (currency === 'INR') {
                    if (inrUnit === 'lakhs') {
                        displayValue = current / 100000;
                        displayInflationAdjusted = inflationAdjusted / 100000;
                    } else if (inrUnit === 'crores') {
                        displayValue = current / 10000000;
                        displayInflationAdjusted = inflationAdjusted / 10000000;
                    } else {
                        displayValue = current;
                        displayInflationAdjusted = inflationAdjusted;
                    }
                } else {
                    displayValue = current;
                    displayInflationAdjusted = inflationAdjusted;
                }
                
                displayValues.push(displayValue);
                chartDatasets[0].data.push(displayValue);
                chartDatasets[1].data.push(displayInflationAdjusted);
                
                // Add variable data to chart (adjust index since we added inflation)
                customVariables.forEach((v, i) => {
                    // For chart, we need the value BEFORE increment (same as table)
                    chartDatasets[i + 2].data.push(variableValues[v.id] - 1);
                });
            }
            
            document.getElementById('results').innerHTML = html;
            
            const ctx = document.getElementById('growthChart').getContext('2d');
            let symbol = currency === 'INR' ? '₹' : '$';
            let unitSuffix = '';
            
            if (currency === 'INR') {
                if (inrUnit === 'lakhs') {
                    unitSuffix = ' L';
                } else if (inrUnit === 'crores') {
                    unitSuffix = ' Cr';
                }
            }
            
            if (chart) {
                chart.destroy();
            }
            
            // Create scales config
            let scales = {
                y: {
                    type: 'linear',
                    position: 'left',
                    beginAtZero: true,
                    ticks: {
                        callback: function(value) {
                            return symbol + value.toLocaleString() + unitSuffix;
                        }
                    }
                },
                x: {
                    title: {
                        display: true,
                        text: 'Year'
                    }
                }
            };
            
            // Add second y-axis for variables if needed
            if (customVariables.length > 0) {
                scales.y1 = {
                    type: 'linear',
                    position: 'right',
                    beginAtZero: true,
                    grid: {
                        drawOnChartArea: false
                    }
                };
            }
            
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: years,
                    datasets: chartDatasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        intersect: false,
                        mode: 'index'
                    },
                    plugins: {
                        title: {
                            display: true,
                            text: 'Corpus Growth Over 30 Years',
                            font: {
                                size: 18,
                                weight: 600
                            },
                            color: '#1d1d1f',
                            padding: {
                                top: 10,
                                bottom: 30
                            }
                        },
                        legend: {
                            display: true,
                            position: 'top',
                            labels: {
                                color: '#1d1d1f',
                                font: {
                                    size: 13,
                                    weight: 500
                                },
                                usePointStyle: true,
                                padding: 20
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(29, 29, 31, 0.9)',
                            titleFont: {
                                size: 14,
                                weight: 600
                            },
                            bodyFont: {
                                size: 13
                            },
                            padding: 12,
                            cornerRadius: 8,
                            callbacks: {
                                label: function(context) {
                                    if (context.datasetIndex === 0 || context.datasetIndex === 1) {
                                        return context.dataset.label + ': ' + symbol + context.parsed.y.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",") + unitSuffix;
                                    }
                                    return context.dataset.label + ': ' + context.parsed.y;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            type: 'linear',
                            position: 'left',
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)',
                                drawBorder: false
                            },
                            ticks: {
                                color: '#86868b',
                                font: {
                                    size: 12
                                },
                                padding: 10,
                                callback: function(value) {
                                    return symbol + value.toLocaleString() + unitSuffix;
                                }
                            }
                        },
                        y1: {
                            type: 'linear',
                            position: 'right',
                            beginAtZero: true,
                            grid: {
                                display: false,
                                drawBorder: false
                            },
                            ticks: {
                                color: '#86868b',
                                font: {
                                    size: 12
                                },
                                padding: 10
                            }
                        },
                        x: {
                            grid: {
                                display: false,
                                drawBorder: false
                            },
                            ticks: {
                                color: '#86868b',
                                font: {
                                    size: 12
                                },
                                maxRotation: 0,
                                autoSkipPadding: 20
                            }
                        }
                    }
                }
            });
        }
        
        function setHistoricalReturn(index) {
            const returnInput = document.getElementById('return');
            if (index === 'nifty') {
                returnInput.value = 12;
            } else if (index === 'sensex') {
                returnInput.value = 13;
            } else if (index === 'sp500') {
                returnInput.value = 10;
            } else if (index === 'dow') {
                returnInput.value = 9;
            }
            calculate(); // Recalculate with new return rate
        }
        
        function updateHistoricalInfo() {
            const currency = document.getElementById('currency').value;
            const historicalInfoDiv = document.getElementById('historical-info');
            
            if (currency === 'INR') {
                historicalInfoDiv.innerHTML = `
                    <p class="historical-note">
                        <strong>INR Markets:</strong> Nifty 50 average (1990-2025): ~12% annual return | Sensex average: ~13%
                        <button class="historical-btn" onclick="setHistoricalReturn('nifty')">Use Nifty 50 (12%)</button>
                        <button class="historical-btn" onclick="setHistoricalReturn('sensex')">Use Sensex (13%)</button>
                    </p>
                `;
            } else {
                historicalInfoDiv.innerHTML = `
                    <p class="historical-note">
                        <strong>USD Markets:</strong> S&P 500 average (1950-2025): ~10% annual return | Dow Jones average: ~9%
                        <button class="historical-btn" onclick="setHistoricalReturn('sp500')">Use S&P 500 (10%)</button>
                        <button class="historical-btn" onclick="setHistoricalReturn('dow')">Use Dow Jones (9%)</button>
                    </p>
                `;
            }
        }
        
        function updateInputSteps() {
            const currency = document.getElementById('currency').value;
            const inrUnit = document.getElementById('inrUnit').value;
            const initialInput = document.getElementById('initial');
            const annualInput = document.getElementById('annual');
            
            if (currency === 'INR') {
                if (inrUnit === 'rupees') {
                    initialInput.step = '1000';
                    annualInput.step = '100';
                } else if (inrUnit === 'lakhs') {
                    initialInput.step = '0.1';
                    annualInput.step = '0.01';
                } else if (inrUnit === 'crores') {
                    initialInput.step = '0.01';
                    annualInput.step = '0.001';
                }
            } else {
                initialInput.step = '1000';
                annualInput.step = '50';
            }
        }
        
        document.getElementById('currency').addEventListener('change', function() {
            const inrUnitGroup = document.getElementById('inrUnitGroup');
            if (this.value === 'INR') {
                inrUnitGroup.style.display = 'block';
                document.getElementById('inrUnit').value = 'crores';
                document.getElementById('initial').value = 1;
                document.getElementById('annual').value = 0.0417; // ~50 lakhs per year / 12 months
            } else {
                inrUnitGroup.style.display = 'none';
                document.getElementById('initial').value = 10000;
                document.getElementById('annual').value = 416.67; // ~$5000 per year / 12 months
            }
            updateHistoricalInfo();
            updateInputSteps();
            calculate();
        });
        
        document.getElementById('inrUnit').addEventListener('change', function() {
            updateInputSteps();
            calculate();
        });
        
        document.getElementById('start-year').addEventListener('change', calculate);
        document.getElementById('inflation').addEventListener('change', calculate);
        
        updateInputSteps();
        updateHistoricalInfo();
        
        // Add default variables
        addCustomVariable();
        addCustomVariable();
        customVariables[0].name = "My Age";
        customVariables[0].startValue = 30;
        customVariables[1].name = "Child's Age";
        customVariables[1].startValue = 5;
        renderCustomVariables();
        
        calculate();
    </script>
</body>
</html>
